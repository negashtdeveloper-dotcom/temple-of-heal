<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Admin – Temple of Heal</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B3A2A'/><text y='72' x='50' text-anchor='middle' font-size='60'>🌿</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --g900: #0F2419; --g800: #1B3A2A; --g600: #2E6B4A; --g400: #5AA878;
      --g100: #EBF5F0; --cream: #F7F2EA; --white: #fff;
      --text: #1A1A1A; --mid: #4A5568; --lt: #718096;
      --border: #E2D9CC; --gold: #C49B3C; --red: #DC2626;
      --r: 0.5rem; --r-lg: 0.875rem; --shadow: 0 2px 12px rgba(0,0,0,.08);
      --trans: .2s ease; --sidebar-w: 240px;
    }
    html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; color: var(--text); background: var(--cream); }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }
    img { max-width: 100%; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0; background: var(--g800);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .sidebar-header {
      padding: 1.1rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex; flex-direction: column; gap: .5rem;
      color: #fff;
    }
    .sidebar-header img { height: 36px; width: auto; max-width: 100%; object-fit: contain; object-position: left; align-self: flex-start; filter: brightness(0) invert(1); opacity: .9; }
    .sidebar-header small { display: block; font-size: .68rem; font-weight: 400; color: rgba(255,255,255,.4); letter-spacing: .04em; }
    .sidebar-nav { flex: 1; padding: .75rem 0; }
    .nav-section { padding: .5rem 1rem .25rem; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.35); font-weight: 500; }
    .nav-item {
      display: flex; align-items: center; gap: .65rem; padding: .65rem 1rem;
      color: rgba(255,255,255,.7); font-size: .875rem; cursor: pointer;
      border-left: 3px solid transparent; transition: var(--trans);
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,.05); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,.08); border-left-color: #9DD4B5; }
    .nav-item svg { width: 1rem; height: 1rem; flex-shrink: 0; }
    .sidebar-footer {
      padding: 1rem; border-top: 1px solid rgba(255,255,255,.08);
      display: flex; flex-direction: column; gap: .5rem;
    }
    .sidebar-footer a {
      display: flex; align-items: center; gap: .5rem; color: rgba(255,255,255,.5);
      font-size: .8rem; transition: color var(--trans);
    }
    .sidebar-footer a:hover { color: rgba(255,255,255,.85); }
    .sidebar-footer a svg { width: .9rem; height: .9rem; }

    /* Main content */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: .875rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .topbar-actions { display: flex; align-items: center; gap: .75rem; }
    .content { flex: 1; padding: 1.5rem; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border-radius: 0.375rem; font-size: .875rem; font-weight: 500; border: none; transition: var(--trans); cursor: pointer; }
    .btn-primary { background: var(--g600); color: #fff; }
    .btn-primary:hover { background: #245839; }
    .btn-secondary { background: var(--white); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--g600); color: var(--g600); }
    .btn-danger { background: #FEF2F2; color: var(--red); border: 1.5px solid #FECACA; }
    .btn-danger:hover { background: #FEE2E2; }
    .btn-sm { padding: .35rem .75rem; font-size: .8rem; }
    .btn svg { width: .9rem; height: .9rem; }

    /* Cards */
    .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }
    .card-header h2 { font-size: 1rem; font-weight: 600; }

    /* Tables */
    .table-wrap { overflow-x: auto; border-radius: var(--r); border: 1.5px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--cream); text-align: left; padding: .65rem 1rem; font-size: .78rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--lt); border-bottom: 1.5px solid var(--border); }
    td { padding: .8rem 1rem; border-bottom: 1px solid var(--border); font-size: .875rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--cream); }
    .td-actions { display: flex; gap: .4rem; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: .25rem; padding: .2rem .6rem; border-radius: 999px; font-size: .72rem; font-weight: 500; }
    .badge-green { background: var(--g100); color: var(--g600); }
    .badge-gold { background: #FFF8E7; color: var(--gold); }
    .badge-gray { background: #F3F4F6; color: #6B7280; }
    .badge-new { background: #FFF7ED; color: #C2410C; }
    .status-dot { width: .5rem; height: .5rem; border-radius: 50%; display: inline-block; }
    .dot-green { background: #22C55E; }
    .dot-gray { background: #9CA3AF; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .field.span-2 { grid-column: 1 / -1; }
    label { font-size: .82rem; font-weight: 500; color: var(--mid); }
    label .req { color: var(--red); margin-left: 2px; }
    input[type=text], input[type=email], input[type=url], input[type=tel], input[type=number],
    textarea, select {
      width: 100%; padding: .6rem .85rem; border: 1.5px solid var(--border); border-radius: var(--r);
      font-size: .875rem; color: var(--text); background: var(--white);
      transition: border-color var(--trans), box-shadow var(--trans); outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--g600); box-shadow: 0 0 0 3px rgba(46,107,74,.1); }
    textarea { resize: vertical; min-height: 100px; }
    .hint { font-size: .75rem; color: var(--lt); }

    /* Tabs */
    .tab-bar { display: flex; gap: .25rem; background: var(--cream); border: 1.5px solid var(--border); border-radius: var(--r); padding: .25rem; margin-bottom: 1.25rem; width: fit-content; flex-wrap: wrap; }
    .tab { padding: .4rem 1rem; border-radius: calc(var(--r) - 2px); font-size: .85rem; font-weight: 500; color: var(--mid); cursor: pointer; transition: var(--trans); border: none; background: none; }
    .tab.active { background: var(--white); color: var(--g600); box-shadow: var(--shadow); }

    /* Fields manager */
    .fields-list { display: flex; flex-direction: column; gap: .5rem; }
    .field-item { display: flex; align-items: center; gap: .75rem; background: var(--cream); border: 1.5px solid var(--border); border-radius: var(--r); padding: .6rem .85rem; }
    .field-item input[type=text] { flex: 1; border: none; background: transparent; box-shadow: none; padding: 0; }
    .field-item input[type=text]:focus { box-shadow: none; border: none; }
    .field-badge { font-size: .7rem; padding: .15rem .5rem; border-radius: 999px; white-space: nowrap; }
    .field-badge.req { background: #FFF7ED; color: #C2410C; }
    .field-badge.opt { background: var(--g100); color: var(--g600); }
    .add-field-row { display: flex; gap: .5rem; margin-top: .5rem; }
    .add-field-row input { flex: 1; }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop[hidden] { display: none; }
    .modal { background: var(--white); border-radius: var(--r-lg); width: 100%; max-width: 680px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-header h3 { font-size: 1rem; font-weight: 600; }
    .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: .75rem; flex-shrink: 0; }

    /* Dashboard stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: 1.25rem; }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--g600); line-height: 1; display: block; }
    .stat-card .lbl { font-size: .82rem; color: var(--lt); margin-top: .3rem; }
    .stat-card .chg { font-size: .78rem; color: #16A34A; margin-top: .5rem; }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: .5rem; }
    .toggle { position: relative; width: 2.5rem; height: 1.4rem; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #D1D5DB; border-radius: 999px; cursor: pointer; transition: var(--trans); }
    .toggle-slider::before { content: ''; position: absolute; width: 1rem; height: 1rem; left: .2rem; top: 50%; transform: translateY(-50%); background: #fff; border-radius: 50%; transition: var(--trans); }
    .toggle input:checked + .toggle-slider { background: var(--g600); }
    .toggle input:checked + .toggle-slider::before { left: 1.3rem; }
    .toggle-label { font-size: .875rem; color: var(--mid); }

    /* Alert */
    .alert { display: flex; align-items: flex-start; gap: .75rem; padding: .875rem 1rem; border-radius: var(--r); margin-bottom: 1rem; font-size: .875rem; }
    .alert-success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
    .alert-error   { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }
    .alert[hidden]  { display: none; }
    .alert svg { width: 1rem; height: 1rem; flex-shrink: 0; margin-top: .1rem; }

    /* Responsive */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 680px) {
      .sidebar { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ────────────────────────────────────────── -->
  <aside class="sidebar" role="navigation" aria-label="Admin navigation">
    <div class="sidebar-header">
      <img src="../assets/logo.png" alt="Temple of Heal">
      <small>Content Manager</small>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" data-panel="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>

      <div class="nav-section">Content</div>
      <div class="nav-item" data-panel="services">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Services
      </div>
      <div class="nav-item" data-panel="experts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Experts / Providers
      </div>
      <div class="nav-item" data-panel="testimonials">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Testimonials
      </div>
      <div class="nav-item" data-panel="faqs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        FAQs
      </div>

      <div class="nav-section">Settings</div>
      <div class="nav-item" data-panel="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Site Settings
      </div>
    </nav>

    <div class="sidebar-footer">
      <a href="../index.html" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View Website
      </a>
      <a href="#" id="export-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export JSON
      </a>
    </div>
  </aside>

  <!-- ── Main content ───────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <h1 id="panel-title">Dashboard</h1>
      <div class="topbar-actions">
        <div id="alert-success" class="alert alert-success" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span id="alert-text">Saved!</span>
        </div>
        <button class="btn btn-primary" id="save-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save All
        </button>
      </div>
    </div>

    <div class="content" id="main-content">
      <!-- Panels rendered by JS -->
    </div>
  </div>
</div>

<!-- Modal for service/expert editing -->
<div class="modal-backdrop" id="modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h3 id="modal-title">Edit Item</h3>
      <button class="btn btn-secondary btn-sm" id="modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Close
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save Changes</button>
    </div>
  </div>
</div>

<script src="../js/cms-data.js"></script>
<script>
(function () {
  'use strict';

  /* ── State ───────────────────────────────────────────── */
  let cms;
  try {
    const saved = localStorage.getItem('toh_cms');
    cms = saved ? JSON.parse(saved) : deepCopy(TOH_CMS);
  } catch (_) {
    cms = deepCopy(TOH_CMS);
  }

  function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }
  function saveCMS() {
    localStorage.setItem('toh_cms', JSON.stringify(cms));
    showAlert('Changes saved successfully!');
  }
  function showAlert(msg) {
    const el = document.getElementById('alert-success');
    document.getElementById('alert-text').textContent = msg;
    el.hidden = false;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.hidden = true; }, 2500);
  }

  let currentPanel = 'dashboard';
  let modalCallback = null;

  /* ── Nav ─────────────────────────────────────────────── */
  document.querySelectorAll('.nav-item[data-panel]').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentPanel = item.dataset.panel;
      document.getElementById('panel-title').textContent = item.textContent.trim();
      renderPanel(currentPanel);
    });
  });

  /* ── Save button ─────────────────────────────────────── */
  document.getElementById('save-btn').addEventListener('click', saveCMS);

  /* ── Export ──────────────────────────────────────────── */
  document.getElementById('export-btn').addEventListener('click', e => {
    e.preventDefault();
    const blob = new Blob([JSON.stringify(cms, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'toh-cms-export.json';
    a.click();
  });

  /* ── Modal ───────────────────────────────────────────── */
  function openModal(title, bodyHtml, onSave) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    modalCallback = onSave;
    document.getElementById('modal').hidden = false;
  }
  function closeModal() {
    document.getElementById('modal').hidden = true;
    modalCallback = null;
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', () => {
    if (modalCallback) modalCallback();
    closeModal();
    saveCMS();
  });
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  /* ── Render panels ───────────────────────────────────── */
  function renderPanel(name) {
    const el = document.getElementById('main-content');
    switch (name) {
      case 'dashboard':    el.innerHTML = dashboardHTML(); break;
      case 'services':     el.innerHTML = servicesHTML(); bindServiceEvents(); break;
      case 'experts':      el.innerHTML = expertsHTML(); bindExpertEvents(); break;
      case 'testimonials': el.innerHTML = testimonialsHTML(); bindTestimonialEvents(); break;
      case 'faqs':         el.innerHTML = faqsHTML(); bindFaqEvents(); break;
      case 'settings':     el.innerHTML = settingsHTML(); bindSettingsEvents(); break;
    }
  }

  /* ── DASHBOARD ───────────────────────────────────────── */
  function dashboardHTML() {
    const activeServices = cms.services.filter(s => s.isActive).length;
    const activeExperts  = cms.experts.filter(e => e.isActive).length;
    return `
    <div class="stats-grid">
      <div class="stat-card"><span class="num">${activeServices}</span><div class="lbl">Active Services</div><div class="chg">↑ ${cms.services.filter(s=>s.isNew).length} new</div></div>
      <div class="stat-card"><span class="num">${activeExperts}</span><div class="lbl">Active Experts</div></div>
      <div class="stat-card"><span class="num">${cms.testimonials.filter(t=>t.isActive).length}</span><div class="lbl">Testimonials</div></div>
      <div class="stat-card"><span class="num">${cms.faqs.filter(f=>f.isActive).length}</span><div class="lbl">Active FAQs</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Quick Actions</h2></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem">
        ${['services','experts','testimonials','faqs','settings'].map(p=>`
          <button class="btn btn-secondary" onclick="document.querySelector('[data-panel=${p}]').click()"
            style="justify-content:flex-start;gap:.5rem;padding:.75rem">
            ${p.charAt(0).toUpperCase()+p.slice(1)}
          </button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Recent Services</h2></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Category</th><th>Type</th><th>Status</th></tr></thead>
          <tbody>${cms.services.slice(0,5).map(s=>`
            <tr>
              <td>${s.name}</td>
              <td><span class="badge badge-green">${s.category}</span></td>
              <td>${s.sessionType}</td>
              <td><span class="status-dot ${s.isActive?'dot-green':'dot-gray'}"></span> ${s.isActive?'Active':'Inactive'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

        <div class="field" style="display:flex;align-items:center;gap:1rem;padding-top:1.5rem">

          <span>Mark as NEW</span>
          <label class="toggle" style="margin-left:1rem"><input type="checkbox" id="s-active" ${s.isActive?'checked':''}><span class="toggle-slider"></span></label>
          <span>Active</span>

      </div>

  function bindServiceEvents() {

    box-shadow:0 32px 80px rgba(0,0,0,.25); overflow:hidden;
    transform-origin:bottom right;
    animation:hkIn .28s cubic-bezier(.22,1,.36,1);
  }
  @keyframes hkIn { from{opacity:0;transform:scale(.9) translateY(10px)} to{opacity:1;transform:none} }
  .hk-panel[hidden]{display:none}
  .hk-head {
    background:#1B3A2A; padding:1rem 1.25rem;
    display:flex; align-items:center; gap:.75rem; color:#fff;
  }
  .hk-av {
    width:2.75rem; height:2.75rem; border-radius:50%;
    overflow:hidden; flex-shrink:0; border:2px solid rgba(255,255,255,.3);
  }
  .hk-av img{width:100%;height:100%;object-fit:cover;object-position:top}
  .hk-head-text strong{display:block;font-size:.9rem}
  .hk-head-text span{font-size:.72rem;opacity:.7}
  .hk-dot{width:.5rem;height:.5rem;border-radius:50%;background:#4ADE80;margin-left:auto;box-shadow:0 0 6px #4ADE80}
  .hk-body{padding:1.25rem;max-height:320px;overflow-y:auto}
  .hk-greeting{
    background:#f0f6f2; border-radius:.75rem; padding:.85rem 1rem;
    font-size:.85rem; line-height:1.6; color:#1a1a1a; margin-bottom:.9rem;
  }
  .hk-greeting strong{display:block;margin-bottom:.25rem;color:#1B3A2A}
  .hk-chips{display:flex;flex-direction:column;gap:.5rem}
  .hk-chip{
    padding:.55rem .9rem; border-radius:.75rem;
    border:1.5px solid #E2D9CC; background:#fff;
    font-size:.8rem; color:#4A5568; cursor:pointer;
    font-family:inherit; text-align:left; transition:all .15s;
  }
  .hk-chip:hover{border-color:#2E6B4A;color:#2E6B4A;background:rgba(46,107,74,.06)}
  .hk-msgs{display:flex;flex-direction:column;gap:.6rem}
  .hk-msg{max-width:85%;padding:.6rem .85rem;border-radius:1rem;font-size:.82rem;line-height:1.55}
  .hk-msg.bot{background:#f0f6f2;color:#1a1a1a;align-self:flex-start;border-bottom-left-radius:.25rem}
  .hk-msg.user{background:#2E6B4A;color:#fff;align-self:flex-end;border-bottom-right-radius:.25rem}
  .hk-typing{display:flex;gap:4px;align-items:center;padding:.5rem .7rem;background:#f0f6f2;border-radius:1rem;width:fit-content}
  .hk-typing span{width:.45rem;height:.45rem;border-radius:50%;background:#2E6B4A;animation:hkDot .9s infinite ease-in-out alternate}
  .hk-typing span:nth-child(2){animation-delay:.15s} .hk-typing span:nth-child(3){animation-delay:.3s}
  @keyframes hkDot{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  .hk-foot{
    display:flex; gap:.5rem; padding:.85rem 1.25rem;
    border-top:1px solid #E2D9CC; background:#fff;
  }
  .hk-input{
    flex:1; border:1.5px solid #E2D9CC; border-radius:999px;
    padding:.5rem .9rem; font-size:.85rem; outline:none;
    font-family:inherit; transition:border-color .2s;
  }
  .hk-input:focus{border-color:#2E6B4A}
  .hk-input::placeholder{color:#A0ADB8}
  .hk-send{
    width:2.1rem;height:2.1rem;border-radius:50%;
    background:#2E6B4A;color:#fff;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .2s;
  }
  .hk-send:hover{background:#245839}
  .hk-send svg{width:.9rem;height:.9rem}
  .hk-row{display:flex;align-items:center;gap:.65rem}
  .hk-trigger{
    width:4rem;height:4rem;border-radius:50%;background:#1B3A2A;
    border:2.5px solid #fff;overflow:hidden;cursor:pointer;
    box-shadow:0 4px 24px rgba(0,0,0,.35); flex-shrink:0;
    transition:transform .2s,box-shadow .2s; padding:0;
  }
  .hk-trigger:hover{transform:scale(1.07);box-shadow:0 6px 28px rgba(0,0,0,.4)}
  .hk-trigger img{width:100%;height:100%;object-fit:cover;object-position:top}
  .hk-trigger-lbl{
    background:#fff;color:#1B3A2A;padding:.42rem 1rem;
    border-radius:999px;font-size:.82rem;font-weight:600;
    box-shadow:0 2px 16px rgba(0,0,0,.13);border:1px solid #E2D9CC;
    white-space:nowrap;cursor:pointer;
    animation:hkLblIn .5s cubic-bezier(.22,1,.36,1) 1.8s both;
    transition:opacity .2s,transform .2s;
  }
  .hk-trigger-lbl:hover{background:#f0f6f2}
  @keyframes hkLblIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
  .hk-open .hk-trigger img{display:none}
  .hk-close-ico{display:none;width:1.25rem;height:1.25rem;margin:auto}
  .hk-open .hk-close-ico{display:block}
  .hk-open .hk-trigger-lbl{opacity:0;pointer-events:none;transform:translateX(8px)}
  .hk-pulse{
    position:absolute;inset:-3px;border-radius:50%;
    border:2px solid #2E6B4A;animation:hkPulse 2.5s infinite;opacity:.6;pointer-events:none;
  }
  @keyframes hkPulse{0%{opacity:.6;transform:scale(1)}70%{opacity:0;transform:scale(1.35)}100%{opacity:0;transform:scale(1.35)}}
  .hk-trigger-wrap{position:relative;flex-shrink:0}
</style>

<div class="hk-widget" id="hk-widget">
  <div class="hk-panel" id="hk-panel" hidden>
    <div class="hk-head">
      <div class="hk-av"><img src="../assets/hoorak-agent.png" alt="Hoorak"></div>
      <div class="hk-head-text"><strong>Hoorak</strong><span>CMS Assistant</span></div>
      <div class="hk-dot"></div>
    </div>
    <div class="hk-body" id="hk-body">
      <div id="hk-intro">
        <div class="hk-greeting">
          <strong>👋 Hi, I'm Hoorak!</strong>
          I'm here to help you manage the Temple of Heal CMS. What would you like to do?
        </div>
        <div class="hk-chips">
          <button class="hk-chip" onclick="hkAsk('How do I add or edit a service?')">📋 Add or edit a service</button>
          <button class="hk-chip" onclick="hkAsk('How do I manage provider profiles?')">👤 Manage provider profiles</button>
          <button class="hk-chip" onclick="hkAsk('How do I update testimonials or FAQs?')">✏️ Update testimonials or FAQs</button>
          <button class="hk-chip" onclick="hkAsk('How do I change site settings?')">⚙️ Site settings & logo</button>
        </div>
      </div>
      <div id="hk-chat" style="display:none">
        <div class="hk-msgs" id="hk-msgs"></div>
      </div>
    </div>
    <div class="hk-foot">
      <input class="hk-input" id="hk-input" type="text" placeholder="Ask anything about the CMS…" autocomplete="off">
      <button class="hk-send" id="hk-send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  <div class="hk-row">
    <div class="hk-trigger-wrap">
      <span class="hk-pulse"></span>
      <button class="hk-trigger" id="hk-trigger" aria-label="Chat with Hoorak" onclick="hkToggle()">
        <img src="../assets/hoorak-agent.png" alt="Hoorak">
        <svg class="hk-close-ico" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <span class="hk-trigger-lbl" onclick="hkToggle()">Ask Hoorak ✨</span>
  </div>
</div>

<script>
(function(){
  const RESPONSES = {
    'how do i add':     "To add a service, click **Services** in the left sidebar → **Add New Service** button. Fill in the name, category, description, price range, session type, and required fields, then click Save.",
    'edit a service':   "Click **Services** in the sidebar, find the service in the list and click **Edit**. Update any fields and hit **Save Changes**. Changes go live instantly.",
    'provider':         "Go to **Experts** in the sidebar. You can add a new provider with their photo, bio, specialty, rating and tier, or click an existing one to edit. Toggle **Active** to show or hide them on the site.",
    'testimonial':      "Click **Testimonials** in the sidebar. Add or edit client quotes, their name, avatar URL, and star rating. Inactive testimonials are hidden from the homepage.",
    'faq':              "Go to **FAQs** in the sidebar. Each FAQ has a question and answer. Toggle **Active** to control which ones appear on the site.",
    'site setting':     "Click **Settings** in the sidebar. You can update the site name, tagline, about text, contact info, social links, and logo URL.",
    'logo':             "In **Settings**, paste the URL of your new logo into the **Logo URL** field and click Save. Leave it blank to use the default.",
    'how do i change':  "Navigate to the relevant section in the sidebar (Services, Experts, Testimonials, FAQs, or Settings), edit the fields you need, and click **Save**.",
    'delete':           "Find the item in its section, click **Edit**, then scroll to the bottom and click **Delete**. This cannot be undone.",
    'publish':          "All changes are saved to your browser's localStorage and go live on the site immediately — no extra publish step needed.",
  };

  let open = false;
  let idx  = 0;
  const DEFAULT = [
    "Great question! The CMS lets you manage Services, Experts, Testimonials, FAQs and Site Settings from the sidebar. Which section can I help you with?",
    "You can update any content by clicking the relevant section in the left sidebar. Would you like step-by-step instructions?",
    "All your changes save instantly to localStorage and reflect on the live site. Is there a specific section you're working on?",
  ];

  window.hkToggle = function() {
    open = !open;
    const w = document.getElementById('hk-widget');
    const p = document.getElementById('hk-panel');
    w.classList.toggle('hk-open', open);
    p.hidden = !open;
  };

  window.hkAsk = function(q) {
    document.getElementById('hk-intro').style.display = 'none';
    document.getElementById('hk-chat').style.display  = '';
    addMsg(q, 'user');
    respond(q);
  };

  document.getElementById('hk-send').addEventListener('click', send);
  document.getElementById('hk-input').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  function send() {
    const inp = document.getElementById('hk-input');
    const q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    document.getElementById('hk-intro').style.display = 'none';
    document.getElementById('hk-chat').style.display  = '';
    addMsg(q, 'user');
    respond(q);
  }

  function respond(q) {
    const typing = addTyping();
    setTimeout(() => {
      typing.remove();
      const lq = q.toLowerCase();
      let reply = DEFAULT[idx++ % DEFAULT.length];
      for (const [key, val] of Object.entries(RESPONSES)) {
        if (lq.includes(key)) { reply = val; break; }
      }
      addMsg(reply, 'bot');
    }, 900);
  }

  function addMsg(text, role) {
    const msgs = document.getElementById('hk-msgs');
    const d = document.createElement('div');
    d.className = 'hk-msg ' + role;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('hk-msgs');
    const d = document.createElement('div');
    d.className = 'hk-typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }
})();
</script>
</body>
</html>
